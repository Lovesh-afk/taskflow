<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#111827);
    font-family:Segoe UI, sans-serif;
}

.login-box{
    width:380px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.08);
    padding:35px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,0.45);
    color:white;
}

.form-control{
    background:#334155;
    border:none;
    color:white;
    border-radius:12px;
    padding:12px;
}

.form-control:focus{
    background:#334155;
    color:white;
    box-shadow:none;
}

.btn-login{
    background:#3b82f6;
    border:none;
    border-radius:12px;
    padding:12px;
    font-weight:600;
    transition:0.3s;
}

.btn-login:hover{
    background:#2563eb;
}

a{
    color:#60a5fa;
    text-decoration:none;
}

a:hover{
    color:white;
}

.small-text{
    color:#cbd5e1;
}
</style>

</head>
<body>

<div class="login-box">

    <div class="text-center mb-4">
        <h2 class="fw-bold">📋 TaskFlow</h2>
        <p class="small-text">Sign in to continue</p>
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-warning py-2">{{ msg }}</div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <form method="POST">

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   name="password"
                   id="password"
                   class="form-control"
                   placeholder="Password"
                   required>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" onclick="togglePassword()">
            <label class="form-check-label small-text">
                Show Password
            </label>
        </div>

        <button class="btn btn-login w-100">
            Login
        </button>

    </form>

    <div class="text-center mt-4">
        <span class="small-text">New user?</span>
        <a href="/register">Create Account</a>
    </div>

</div>
<script>
function togglePassword(){
    let pass = document.getElementById("password");

    if(pass.type === "password"){
        pass.type = "text";
    }else{
        pass.type = "password";
    }
}
</script>
</body>
</html>
